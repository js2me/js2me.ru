name: Build and Manual Deploy

on:
  push:
    branches: [ "main" ]
  # Позволяет запускать деплой вручную
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # Настройка Node.js (укажите вашу версию)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build project
        run: npm run build # Замените на вашу команду сборки (результат обычно в папке dist или build)
        
      # Сохраняем собранные файлы
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-files
          path: dist/ # Замените на вашу папку со сборкой (например, build/ для React)

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-files
          path: dist/

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add Server to Known Hosts
        run: ssh-keyscan -H ${{ secrets.HOST }} >> ~/.ssh/known_hosts

      - name: Zero-Downtime Deploy script
        run: |
          RELEASE_NAME=$(date +%Y%m%d%H%M%S)
          RELEASE_DIR="/var/www/${{ secrets.DOMAIN }}/releases/$RELEASE_NAME"
          
          # 1. Создаем папку релиза на сервере
          ssh ${{ secrets.USERNAME }}@${{ secrets.HOST }} "mkdir -p $RELEASE_DIR"
          
          # 2. Копируем туда файлы
          rsync -avz --delete ./dist/ ${{ secrets.USERNAME }}@${{ secrets.HOST }}:$RELEASE_DIR
          
          # 3. Атомарно переключаем симлинк (пользователи получают новую версию мгновенно)
          ssh ${{ secrets.USERNAME }}@${{ secrets.HOST }} "ln -sfn $RELEASE_DIR /var/www/${{ secrets.DOMAIN }}/current"
          
          # 4. Очистка старых релизов (оставляем последние 10, чтобы не забить диск)
          ssh ${{ secrets.USERNAME }}@${{ secrets.HOST }} "cd /var/www/${{ secrets.DOMAIN }}/releases && ls -1tr | head -n -10 | xargs -d '\n' rm -rf --"